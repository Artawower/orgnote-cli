name: Publish to NPM

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, dev]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Check if release was created
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event.workflow_run.head_branch }}" = "dev" ]; then
            RELEASE_TAG="${VERSION}-dev.${{ github.event.workflow_run.run_number }}.${{ github.event.workflow_run.run_attempt }}"
          else
            RELEASE_TAG="$VERSION"
          fi
          RELEASE=$(gh release view "$RELEASE_TAG" --json tagName 2>/dev/null || echo "")
          if [ -z "$RELEASE" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "No GitHub release for $RELEASE_TAG, skipping publish"
            exit 0
          fi
          if npm view "orgnote-cli@$RELEASE_TAG" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "Version $RELEASE_TAG already published to npm, skipping"
            exit 0
          fi
          echo "should_publish=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "Release $RELEASE_TAG exists and not yet on npm, will publish"

      - name: Diagnose npm environment
        run: |
          echo "=== npm version ==="
          npm --version
          echo "=== node version ==="
          node --version
          echo "=== npm config ==="
          npm config list
          echo "=== OIDC env ==="
          echo "GITHUB_ACTIONS: ${GITHUB_ACTIONS}"
          echo "ACTIONS_ID_TOKEN_REQUEST_URL set: $([ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] && echo yes || echo no)"
          echo "NODE_AUTH_TOKEN set: $([ -n "${NODE_AUTH_TOKEN:-}" ] && echo yes || echo no)"
          echo "NPM_CONFIG_USERCONFIG: ${NPM_CONFIG_USERCONFIG:-not set}"
          [ -f "${NPM_CONFIG_USERCONFIG:-/nonexistent}" ] && echo "=== npmrc content ===" && cat "$NPM_CONFIG_USERCONFIG" || echo "(no npmrc file)"

      - name: Publish stable package
        if: >-
          github.event.workflow_run.head_branch == 'master' &&
          steps.check_release.outputs.should_publish == 'true'
        run: |
          echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --access public

      - name: Publish dev package
        if: >-
          github.event.workflow_run.head_branch == 'dev' &&
          steps.check_release.outputs.should_publish == 'true'
        run: |
          npm version "${{ steps.check_release.outputs.release_tag }}" --no-git-tag-version
          echo "registry=https://registry.npmjs.org/" > "$NPM_CONFIG_USERCONFIG"
          npm publish --provenance --tag dev --access public
