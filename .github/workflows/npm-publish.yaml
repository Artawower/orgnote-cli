name: Publish to NPM

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master, dev]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - name: Verify trusted publishing auth
        run: |
          if [ -n "${NODE_AUTH_TOKEN:-}" ] || [ -n "${NPM_TOKEN:-}" ]; then
            echo "Unexpected npm token present; remove NODE_AUTH_TOKEN/NPM_TOKEN."
            exit 1
          fi
          TOKEN_VALUE="$(npm config get _authToken 2>/dev/null || true)"
          if [ -n "$TOKEN_VALUE" ] && [ "$TOKEN_VALUE" != "undefined" ] && [ "$TOKEN_VALUE" != "null" ]; then
            echo "Unexpected npmrc auth token present; remove _authToken."
            exit 1
          fi
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check if release was created
        id: check_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "${{ github.event.workflow_run.head_branch }}" = "dev" ]; then
            RELEASE_TAG="${VERSION}-dev.${{ github.event.workflow_run.run_number }}.${{ github.event.workflow_run.run_attempt }}"
          else
            RELEASE_TAG="$VERSION"
          fi
          RELEASE=$(gh release view "$RELEASE_TAG" --json tagName 2>/dev/null || echo "")
          if [ -n "$RELEASE" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
            echo "Release $RELEASE_TAG exists, will publish"
            exit 0
          fi
          echo "should_publish=false" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "No release for $RELEASE_TAG, skipping publish"
      - name: Publish dev package
        if: github.event.workflow_run.head_branch == 'dev' && steps.check_release.outputs.should_publish == 'true'
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc
          NPM_CONFIG_GLOBALCONFIG: ${{ runner.temp }}/npmrc-global
        run: |
          npm version "${{ steps.check_release.outputs.release_tag }}" --no-git-tag-version
          : > "$NPM_CONFIG_USERCONFIG"
          : > "$NPM_CONFIG_GLOBALCONFIG"
          env -u NODE_AUTH_TOKEN -u NPM_TOKEN npm publish --provenance --tag dev --access public --registry https://registry.npmjs.org
      - name: Publish stable package
        if: github.event.workflow_run.head_branch == 'master' && steps.check_release.outputs.should_publish == 'true'
        env:
          NPM_CONFIG_USERCONFIG: ${{ runner.temp }}/npmrc
          NPM_CONFIG_GLOBALCONFIG: ${{ runner.temp }}/npmrc-global
        run: |
          : > "$NPM_CONFIG_USERCONFIG"
          : > "$NPM_CONFIG_GLOBALCONFIG"
          env -u NODE_AUTH_TOKEN -u NPM_TOKEN npm publish --provenance --access public --registry https://registry.npmjs.org
